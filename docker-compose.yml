services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ads-reporting
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists(os.environ.get('DB_PATH','/data/metrics.db')) else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
